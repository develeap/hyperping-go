version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: hyp
    main: ./cmd/hyp
    binary: hyp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: hyp
    builds: [hyp]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

brews:
  - name: hyp
    repository:
      owner: develeap
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/develeap/hyperping-go"
    description: "Hyperping CLI - monitor uptime monitoring resources from the command line"
    license: "MIT"
    install: |
      bin.install "hyp"
    test: |
      system "#{bin}/hyp", "version"
