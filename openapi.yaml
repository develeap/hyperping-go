openapi: "3.1.0"

info:
  title: Hyperping API
  version: "2026-06-12"
  description: >
    REST and MCP API for the Hyperping monitoring platform.
    All REST endpoints require Bearer token authentication.
  license:
    name: MIT

servers:
  - url: https://api.hyperping.io
    description: Production

security:
  - bearerAuth: []

tags:
  - name: monitors
    description: Uptime monitors
  - name: healthchecks
    description: Cron / heartbeat health checks
  - name: incidents
    description: Incidents and status updates
  - name: maintenance
    description: Maintenance windows
  - name: outages
    description: Outage records
  - name: reports
    description: Monitor performance reports
  - name: statuspages
    description: Public status pages
  - name: subscribers
    description: Status page subscribers
  - name: mcp
    description: MCP JSON-RPC 2.0 tool dispatch

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:

    # ── Primitives ──────────────────────────────────────────────────────────────

    FlexibleString:
      description: A value that may be either a string (e.g. "2xx") or a number (e.g. 200).
      oneOf:
        - type: string
        - type: number

    LocalizedText:
      type: object
      description: A piece of text available in one or more languages.
      properties:
        en: { type: string }
        fr: { type: string }
        de: { type: string }
        ru: { type: string }
        nl: { type: string }
        es: { type: string }
        it: { type: string }
        pt: { type: string }
        ja: { type: string }
        zh: { type: string }

    RequestHeader:
      type: object
      required: [name, value]
      properties:
        name: { type: string }
        value: { type: string }

    ErrorResponse:
      type: object
      properties:
        message: { type: string }
        errors:
          type: object
          additionalProperties: true

    # ── Monitors ────────────────────────────────────────────────────────────────

    EscalationPolicyRef:
      type: object
      description: Read-side escalation policy reference (contains uuid and name).
      properties:
        uuid: { type: string }
        name: { type: string }

    EscalationPolicyWrite:
      type: string
      description: Write-side escalation policy reference (plain UUID string).

    Monitor:
      type: object
      properties:
        id: { type: integer }
        uuid: { type: string }
        name: { type: string }
        url: { type: string }
        protocol:
          type: string
          enum: [http, port, icmp, dns]
        http_method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS]
        regions:
          type: array
          items: { type: string }
        check_frequency: { type: integer }
        request_headers:
          type: array
          items: { "$ref": "#/components/schemas/RequestHeader" }
        request_body: { type: string }
        follow_redirects: { type: boolean }
        expected_status_code: { "$ref": "#/components/schemas/FlexibleString" }
        required_keyword: { type: string }
        paused: { type: boolean }
        port: { type: integer }
        alerts_wait: { type: integer }
        escalation_policy: { "$ref": "#/components/schemas/EscalationPolicyRef" }
        dns_record_type: { type: string }
        dns_nameserver: { type: string }
        dns_expected_answer: { type: string }
        status: { type: string }
        ssl_expiration: { type: integer }
        projectUuid: { type: string }
      example:
        uuid: mon_abc123
        name: Production API
        url: https://api.example.com/health
        protocol: http
        http_method: GET
        check_frequency: 60
        paused: false
        status: up

    CreateMonitorRequest:
      type: object
      required: [name, url]
      properties:
        name: { type: string }
        url: { type: string }
        protocol:
          type: string
          enum: [http, port, icmp, dns]
          default: http
        http_method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS]
          default: GET
        regions:
          type: array
          items: { type: string }
        check_frequency: { type: integer }
        follow_redirects: { type: boolean }
        timeout: { type: integer }
        expected_status_code: { type: string }
        request_body: { type: string }
        request_headers:
          type: array
          items: { "$ref": "#/components/schemas/RequestHeader" }
        required_keyword: { type: string }
        paused: { type: boolean }
        port: { type: integer }
        alerts_wait: { type: integer }
        escalation_policy: { "$ref": "#/components/schemas/EscalationPolicyWrite" }
        dns_record_type: { type: string }
        dns_nameserver: { type: string }
        dns_expected_answer: { type: string }
        projectUuid: { type: string }

    UpdateMonitorRequest:
      type: object
      properties:
        name: { type: string }
        url: { type: string }
        protocol: { type: string }
        http_method: { type: string }
        regions:
          type: array
          items: { type: string }
        check_frequency: { type: integer }
        follow_redirects: { type: boolean }
        timeout: { type: integer }
        expected_status_code: { type: string }
        request_body: { type: string }
        request_headers:
          type: array
          items: { "$ref": "#/components/schemas/RequestHeader" }
        required_keyword: { type: string }
        paused: { type: boolean }
        port: { type: integer }
        alerts_wait: { type: integer }
        escalation_policy: { "$ref": "#/components/schemas/EscalationPolicyWrite" }
        dns_record_type: { type: string }
        dns_nameserver: { type: string }
        dns_expected_answer: { type: string }

    # ── Healthchecks ────────────────────────────────────────────────────────────

    EscalationPolicyReference:
      type: object
      description: Escalation policy reference used in healthchecks and outages.
      properties:
        uuid: { type: string }
        name: { type: string }
        alertedSteps: { type: integer }
        totalSteps: { type: integer }

    Healthcheck:
      type: object
      properties:
        uuid: { type: string }
        name: { type: string }
        pingUrl: { type: string }
        cron: { type: string }
        timezone: { type: string }
        tz: { type: string }
        periodValue: { type: integer }
        periodType:
          type: string
          enum: [seconds, minutes, hours, days]
        period: { type: integer }
        gracePeriod: { type: integer }
        gracePeriodValue: { type: integer }
        gracePeriodType:
          type: string
          enum: [seconds, minutes, hours, days]
        isDown: { type: boolean }
        isPaused: { type: boolean }
        lastPing: { type: string }
        dueDate: { type: string }
        createdAt: { type: string }
        lastLogStartDate: { type: string }
        lastLogEndDate: { type: string }
        escalationPolicy: { "$ref": "#/components/schemas/EscalationPolicyReference" }
      example:
        uuid: tok_abc123def456
        name: Daily backup check
        period: 86400
        gracePeriod: 3600
        isDown: false
        isPaused: false

    CreateHealthcheckRequest:
      type: object
      required: [name, grace_period_value, grace_period_type]
      properties:
        name: { type: string }
        cron: { type: string }
        timezone: { type: string }
        period_value: { type: integer }
        period_type:
          type: string
          enum: [seconds, minutes, hours, days]
        grace_period_value: { type: integer }
        grace_period_type:
          type: string
          enum: [seconds, minutes, hours, days]
        escalation_policy: { type: string }

    UpdateHealthcheckRequest:
      type: object
      properties:
        name: { type: string }
        cron: { type: string }
        timezone: { type: string }
        period_value: { type: integer }
        period_type:
          type: string
          enum: [seconds, minutes, hours, days]
        grace_period_value: { type: integer }
        grace_period_type:
          type: string
          enum: [seconds, minutes, hours, days]
        escalation_policy: { type: string }

    HealthcheckAction:
      type: object
      properties:
        message: { type: string }
        uuid: { type: string }

    # ── Incidents ───────────────────────────────────────────────────────────────

    IncidentUpdate:
      type: object
      properties:
        uuid: { type: string }
        date: { type: string }
        text: { "$ref": "#/components/schemas/LocalizedText" }
        type:
          type: string
          enum: [investigating, identified, update, monitoring, resolved]

    Incident:
      type: object
      properties:
        uuid: { type: string }
        date: { type: string }
        title: { "$ref": "#/components/schemas/LocalizedText" }
        text: { "$ref": "#/components/schemas/LocalizedText" }
        type:
          type: string
          enum: [outage, incident]
        affectedComponents:
          type: array
          items: { type: string }
        statuspages:
          type: array
          items: { type: string }
        updates:
          type: array
          items: { "$ref": "#/components/schemas/IncidentUpdate" }
      example:
        uuid: inc_xyz789
        type: outage
        statuspages: [sp_abc123]

    AddIncidentUpdateRequest:
      type: object
      required: [text, type]
      properties:
        text: { "$ref": "#/components/schemas/LocalizedText" }
        type:
          type: string
          enum: [investigating, identified, update, monitoring, resolved]
        date: { type: string }

    CreateIncidentRequest:
      type: object
      required: [title, text, type, statuspages]
      properties:
        title: { "$ref": "#/components/schemas/LocalizedText" }
        text: { "$ref": "#/components/schemas/LocalizedText" }
        type:
          type: string
          enum: [outage, incident]
        affectedComponents:
          type: array
          items: { type: string }
        statuspages:
          type: array
          items: { type: string }
        date: { type: string }
        updates:
          type: array
          items: { "$ref": "#/components/schemas/AddIncidentUpdateRequest" }

    UpdateIncidentRequest:
      type: object
      properties:
        title: { "$ref": "#/components/schemas/LocalizedText" }
        text: { "$ref": "#/components/schemas/LocalizedText" }
        type:
          type: string
          enum: [outage, incident]
        affectedComponents:
          type: array
          items: { type: string }
        statuspages:
          type: array
          items: { type: string }
        updates:
          type: array
          items: { "$ref": "#/components/schemas/AddIncidentUpdateRequest" }

    # ── Maintenance ─────────────────────────────────────────────────────────────

    MaintenanceUpdate:
      type: object
      properties:
        text: { "$ref": "#/components/schemas/LocalizedText" }
        date: { type: string }

    Maintenance:
      type: object
      properties:
        uuid: { type: string }
        name: { type: string }
        title: { "$ref": "#/components/schemas/LocalizedText" }
        text: { "$ref": "#/components/schemas/LocalizedText" }
        start_date: { type: string }
        end_date: { type: string }
        timezone: { type: string }
        monitors:
          type: array
          items: { type: string }
        statuspages:
          type: array
          items: { type: string }
        bulkUuid: { type: string }
        createdBy: { type: string }
        createdAt: { type: string }
        notificationOption:
          type: string
          enum: [none, scheduled, immediate]
        notificationMinutes: { type: integer }
        status: { type: string }
        updates:
          type: array
          items: { "$ref": "#/components/schemas/MaintenanceUpdate" }
      example:
        uuid: mw_abc123
        name: Database upgrade
        status: upcoming

    CreateMaintenanceRequest:
      type: object
      required: [name, start_date, end_date, monitors]
      properties:
        name: { type: string }
        title: { "$ref": "#/components/schemas/LocalizedText" }
        text: { "$ref": "#/components/schemas/LocalizedText" }
        start_date: { type: string }
        end_date: { type: string }
        monitors:
          type: array
          items: { type: string }
        statuspages:
          type: array
          items: { type: string }
        notificationOption:
          type: string
          enum: [none, scheduled, immediate]
        notificationMinutes: { type: integer }

    UpdateMaintenanceRequest:
      type: object
      properties:
        name: { type: string }
        title: { "$ref": "#/components/schemas/LocalizedText" }
        text: { "$ref": "#/components/schemas/LocalizedText" }
        start_date: { type: string }
        end_date: { type: string }
        monitors:
          type: array
          items: { type: string }
        statuspages:
          type: array
          items: { type: string }
        notificationOption:
          type: string
          enum: [none, scheduled, immediate]
        notificationMinutes: { type: integer }

    # ── Outages ─────────────────────────────────────────────────────────────────

    AcknowledgedByUser:
      type: object
      properties:
        uuid: { type: string }
        email: { type: string }
        name: { type: string }

    MonitorReference:
      type: object
      properties:
        uuid: { type: string }
        name: { type: string }
        url: { type: string }
        protocol: { type: string }

    OutageAction:
      type: object
      properties:
        message: { type: string }

    Outage:
      type: object
      properties:
        uuid: { type: string }
        startDate: { type: string }
        endDate:
          type: ["string", "null"]
          description: ISO 8601 timestamp; null if the outage is ongoing.
        durationMs: { type: integer }
        statusCode: { type: integer }
        description: { type: string }
        outageType:
          type: string
          enum: [manual, automatic]
        isResolved: { type: boolean }
        detectedLocation: { type: string }
        confirmedLocations: { type: string }
        acknowledgedAt:
          type: ["string", "null"]
          description: ISO 8601 timestamp; null if not yet acknowledged.
        acknowledgedBy: { "$ref": "#/components/schemas/AcknowledgedByUser" }
        monitor: { "$ref": "#/components/schemas/MonitorReference" }
        escalationPolicy: { "$ref": "#/components/schemas/EscalationPolicyReference" }
        severity: { type: string }
        summary: { type: string }
      example:
        uuid: outage_abc123
        outageType: automatic
        isResolved: false

    CreateOutageRequest:
      type: object
      required: [monitorUuid, startDate, statusCode, description, outageType]
      properties:
        monitorUuid: { type: string }
        startDate: { type: string }
        endDate: { type: string }
        statusCode: { type: integer }
        description: { type: string }
        outageType:
          type: string
          enum: [manual]
        escalationPolicyUuid: { type: string }
        severity: { type: string }
        summary: { type: string }

    # ── Reports ─────────────────────────────────────────────────────────────────

    ReportPeriod:
      type: object
      properties:
        from: { type: string }
        to: { type: string }

    OutageDetail:
      type: object
      properties:
        startDate: { type: string }
        endDate: { type: string }
        duration: { type: integer }
        durationFormatted: { type: string }

    OutageStats:
      type: object
      properties:
        count: { type: integer }
        totalDowntime: { type: integer }
        totalDowntimeFormatted: { type: string }
        longestOutage: { type: integer }
        longestOutageFormatted: { type: string }
        details:
          type: array
          items: { "$ref": "#/components/schemas/OutageDetail" }

    MonitorReport:
      type: object
      properties:
        uuid: { type: string }
        name: { type: string }
        protocol: { type: string }
        period: { "$ref": "#/components/schemas/ReportPeriod" }
        sla: { type: number }
        mttr: { type: integer }
        mttrFormatted: { type: string }
        outages: { "$ref": "#/components/schemas/OutageStats" }
      example:
        uuid: mon_abc123
        name: Production API
        sla: 99.95

    ListMonitorReportsResponse:
      type: object
      properties:
        period: { "$ref": "#/components/schemas/ReportPeriod" }
        monitors:
          type: array
          items: { "$ref": "#/components/schemas/MonitorReport" }

    # ── Status Pages ────────────────────────────────────────────────────────────

    StatusPageSubscribeSettings:
      type: object
      properties:
        enabled: { type: boolean }
        email: { type: boolean }
        slack: { type: boolean }
        teams: { type: boolean }
        sms: { type: boolean }

    StatusPageAuthenticationSettings:
      type: object
      properties:
        password_protection: { type: boolean }
        google_sso: { type: boolean }
        saml_sso: { type: boolean }
        google_allowed_domains:
          type: array
          items: { type: string }
        sso_connection_uuid: { type: string }

    StatusPageSettings:
      type: object
      properties:
        name: { type: string }
        website: { type: string }
        description:
          type: object
          additionalProperties: { type: string }
        languages:
          type: array
          items: { type: string }
        default_language: { type: string }
        theme:
          type: string
          enum: [light, dark, system]
        font: { type: string }
        accent_color: { type: string }
        auto_refresh: { type: boolean }
        banner_header: { type: boolean }
        logo: { type: string }
        logo_height: { type: string }
        favicon: { type: string }
        hide_powered_by: { type: boolean }
        hide_from_search_engines: { type: boolean }
        google_analytics: { type: string }
        subscribe: { "$ref": "#/components/schemas/StatusPageSubscribeSettings" }
        authentication: { "$ref": "#/components/schemas/StatusPageAuthenticationSettings" }

    StatusPageService:
      type: object
      properties:
        id: { "$ref": "#/components/schemas/FlexibleString" }
        uuid: { type: string }
        name:
          type: object
          additionalProperties: { type: string }
        is_group: { type: boolean }
        show_uptime: { type: boolean }
        show_response_times: { type: boolean }
        description:
          type: object
          additionalProperties: { type: string }
        services:
          type: array
          items: { "$ref": "#/components/schemas/StatusPageService" }

    StatusPageSection:
      type: object
      properties:
        name:
          type: object
          additionalProperties: { type: string }
        is_split: { type: boolean }
        services:
          type: array
          items: { "$ref": "#/components/schemas/StatusPageService" }

    StatusPage:
      type: object
      properties:
        uuid: { type: string }
        name: { type: string }
        hostname:
          type: ["string", "null"]
          description: Custom domain; null if none configured.
        hostedsubdomain: { type: string }
        url: { type: string }
        password_protected: { type: boolean }
        settings: { "$ref": "#/components/schemas/StatusPageSettings" }
        sections:
          type: array
          items: { "$ref": "#/components/schemas/StatusPageSection" }
      example:
        uuid: sp_abc123
        name: Acme Status

    StatusPagePaginatedResponse:
      type: object
      properties:
        statuspages:
          type: array
          items: { "$ref": "#/components/schemas/StatusPage" }
        hasNextPage: { type: boolean }
        total: { type: integer }
        page: { type: integer }
        resultsPerPage: { type: integer }

    CreateStatusPageRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        subdomain: { type: string }
        hostname: { type: string }
        website: { type: string }
        description: { type: string }
        languages:
          type: array
          items: { type: string }
        default_language: { type: string }
        theme:
          type: string
          enum: [light, dark, system]
        font: { type: string }
        accent_color: { type: string }
        auto_refresh: { type: boolean }
        banner_header: { type: boolean }
        logo: { type: string }
        logo_height: { type: string }
        favicon: { type: string }
        hide_powered_by: { type: boolean }
        hide_from_search_engines: { type: boolean }
        google_analytics: { type: string }
        password: { type: string }

    UpdateStatusPageRequest:
      type: object
      properties:
        name: { type: string }
        subdomain: { type: string }
        hostname: { type: string }
        website: { type: string }
        description: { type: string }
        languages:
          type: array
          items: { type: string }
        default_language: { type: string }
        theme: { type: string }
        font: { type: string }
        accent_color: { type: string }
        auto_refresh: { type: boolean }
        banner_header: { type: boolean }
        logo: { type: string }
        logo_height: { type: string }
        favicon: { type: string }
        hide_powered_by: { type: boolean }
        hide_from_search_engines: { type: boolean }
        google_analytics: { type: string }
        password: { type: string }

    # ── Subscribers ─────────────────────────────────────────────────────────────

    StatusPageSubscriber:
      type: object
      properties:
        id: { type: integer }
        type:
          type: string
          enum: [email, sms, slack, teams]
        value: { type: string }
        language: { type: string }
        email: { type: string }
        phone: { type: string }
        slack_channel: { type: string }
        created_at: { type: string }

    SubscriberPaginatedResponse:
      type: object
      properties:
        subscribers:
          type: array
          items: { "$ref": "#/components/schemas/StatusPageSubscriber" }
        hasNextPage: { type: boolean }
        total: { type: integer }
        page: { type: integer }
        resultsPerPage: { type: integer }

    AddSubscriberRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [email, sms, teams]
        email: { type: string }
        phone: { type: string }
        teams_webhook_url: { type: string }
        language: { type: string }

    # ── MCP models ──────────────────────────────────────────────────────────────

    StatusSummary:
      type: object
      properties:
        total: { type: integer }
        up: { type: integer }
        down: { type: integer }
        paused: { type: integer }
        unknown: { type: integer }
        down_monitors:
          type: array
          items: { type: string }
        paused_monitors:
          type: array
          items: { type: string }

    AlertTimeGroup:
      type: object
      properties:
        time: { type: string }
        count: { type: integer }

    Alert:
      type: object
      properties:
        uuid: { type: string }
        monitor_uuid: { type: string }
        status: { type: string }
        triggered_at: { type: string }
        acknowledged_by: { type: string }
        resolved_at: { type: string }

    AlertHistory:
      type: object
      properties:
        timeGroups:
          type: array
          items: { "$ref": "#/components/schemas/AlertTimeGroup" }
        totalAlerts: { type: integer }
        downAlerts: { type: integer }
        upAlerts: { type: integer }
        rawAlerts:
          type: array
          items: { "$ref": "#/components/schemas/Alert" }

    TeamMember:
      type: object
      properties:
        uuid: { type: string }
        email: { type: string }
        name: { type: string }
        phone: { type: string }
        profilePictureUrl: { type: string }
        ssoPictureUrl:
          type: ["string", "null"]
          description: SSO profile picture URL; null when not set via SSO.
        accountRole: { type: string }

    EscalationStep:
      type: object
      properties:
        delay: { type: integer }
        target_type:
          type: string
          enum: [user, schedule, integration]
        target_id: { type: string }

    MCPEscalationPolicy:
      type: object
      properties:
        uuid: { type: string }
        name: { type: string }
        team: { type: string }
        steps:
          type: array
          items: { "$ref": "#/components/schemas/EscalationStep" }

    MCPIntegration:
      type: object
      properties:
        uuid: { type: string }
        name: { type: string }
        type: { type: string }

    MCPError:
      type: object
      required: [code, message]
      properties:
        code: { type: integer }
        message: { type: string }
        data: {}

    MCPResponse:
      type: object
      required: [jsonrpc, id]
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          type: ["string", "null"]
        result: {}
        error: { "$ref": "#/components/schemas/MCPError" }

    # ── MCP request schemas ──────────────────────────────────────────────────────

    MCPRequest_list_monitors:
      type: object
      required: [jsonrpc, method]
      properties:
        jsonrpc: { type: string, enum: ["2.0"] }
        id: { type: ["string", "null"] }
        method: { type: string, enum: [list_monitors] }
        params:
          type: object
          properties:
            status: { type: string, description: "Filter by state." }
            page: { type: integer, description: "Zero-indexed page." }
            limit: { type: integer, description: "Rows per page. Default 50, max 200." }

    MCPRequest_get_monitor:
      type: object
      required: [jsonrpc, method]
      properties:
        jsonrpc: { type: string, enum: ["2.0"] }
        id: { type: ["string", "null"] }
        method: { type: string, enum: [get_monitor] }
        params:
          type: object
          required: [uuid]
          properties:
            uuid: { type: string }

    MCPRequest_create_monitor:
