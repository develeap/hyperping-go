paths:

  # ── Monitors ──────────────────────────────────────────────────────────────────

  /v1/monitors:
    get:
      operationId: listMonitors
      summary: List monitors
      tags: [monitors]
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: List of monitors
          content:
            application/json:
              schema:
                type: array
                items: { "$ref": "#/components/schemas/Monitor" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { "$ref": "#/components/schemas/ErrorResponse" }
    post:
      operationId: createMonitor
      summary: Create a monitor
      tags: [monitors]
      requestBody:
        required: true
        content:
          application/json:
            schema: { "$ref": "#/components/schemas/CreateMonitorRequest" }
      responses:
        "201":
          description: Monitor created
          content:
            application/json:
              schema: { "$ref": "#/components/schemas/Monitor" }
        "400":
          description: Bad request
          content:
            application/json:
              schema: { "$ref": "#/components/schemas/ErrorResponse" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { "$ref": "#/components/schemas/ErrorResponse" }

  /v1/monitors/{uuid}:
    parameters:
