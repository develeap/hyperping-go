name: CI

on:
  pull_request:
    paths-ignore:
      - 'tools/**'
      - '**.md'
  push:
    branches:
      - main
    paths-ignore:
      - 'tools/**'
      - '**.md'

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        go-version: ['1.22', '1.23', '1.26']

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go.sum

      - name: Build
        run: |
          export GOTOOLCHAIN=auto
          go build ./...

      - name: Test
        run: |
          export GOTOOLCHAIN=auto
          go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: matrix.go-version == '1.26'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.out
          retention-days: 14

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.11.4

      - name: Vet
        run: |
          export GOTOOLCHAIN=auto
          go vet ./...

  vuln:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache-dependency-path: go.sum

      - name: Install govulncheck
        run: |
          export GOTOOLCHAIN=auto
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  integration:
    name: MCP integration (live server)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The job opts in to the live MCP server only when the consuming
    # repository has configured a HYPERPING_TEST_API_KEY secret. PRs from
    # forks (where secrets are unavailable) skip cleanly. The actual test
    # bodies also re-check the env var and t.Skip() if missing, so a
    # mis-configured runner never reports false-green for the case where
    # the secret accidentally goes empty.
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.fork == false }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Integration tests
        env:
          HYPERPING_TEST_API_KEY: ${{ secrets.HYPERPING_TEST_API_KEY }}
        run: |
          export GOTOOLCHAIN=auto
          if [ -z "$HYPERPING_TEST_API_KEY" ]; then
            echo "HYPERPING_TEST_API_KEY not configured for this repository — skipping live MCP integration"
            exit 0
          fi
          go test -tags=integration -race -count=1 -timeout=5m ./...

  generate-check:
    name: Codegen staleness check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Check models_gen.go is up to date
        run: |
          export GOTOOLCHAIN=auto
          go generate ./...
          git diff --exit-code models_gen.go

  cross-compile:
    name: Cross-compile check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        include:
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: "386" }
          - { goos: linux,   goarch: arm,  goarm: "7" }
          - { goos: linux,   goarch: arm,  goarm: "6" }
          - { goos: linux,   goarch: "386" }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: Cross-compile ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          export GOTOOLCHAIN=auto
          go build -trimpath -ldflags="-s -w" -o /dev/null ./...
