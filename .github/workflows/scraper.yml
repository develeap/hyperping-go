name: API Documentation Scraper

on:
  schedule:
    - cron: '17 1 * * *'
    - cron: '17 5 * * *'
    - cron: '17 9 * * *'
    - cron: '17 13 * * *'
    - cron: '17 17 * * *'
    - cron: '17 21 * * *'

  workflow_dispatch:
    inputs:
      log_level:
        description: 'Log level'
        required: false
        default: 'info'
        type: choice
        options:
          - debug
          - info
          - warn
          - error

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'tools/cmd/scraper/go.mod'
          cache-dependency-path: tools/cmd/scraper/go.sum

      - name: Build scraper
        working-directory: tools/cmd/scraper
        run: go build -o scraper

      - name: Run scraper
        working-directory: tools/cmd/scraper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          LOG_FORMAT: json
          LOG_LEVEL: ${{ inputs.log_level || 'info' }}
          CHROME_BIN: google-chrome-stable
        run: |
          ./scraper 2>&1 | tee scraper.log
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> "$GITHUB_ENV"

      - name: Upload scraper logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        with:
          name: scraper-logs-${{ github.run_id }}
          path: tools/cmd/scraper/scraper.log
          retention-days: 30

      - name: Upload diff reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        with:
          name: diff-reports-${{ github.run_id }}
          path: tools/cmd/scraper/api_changes_*.md
          retention-days: 90
          if-no-files-found: ignore

      - name: Commit updated OAS snapshots
        if: env.EXIT_CODE == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/cmd/scraper/snapshots/ tools/cmd/scraper/docs_scraped/ || true
          if git diff --cached --quiet; then
            echo "No OAS changes — snapshots are up to date."
          else
            BRANCH="chore/oas-snapshots-$(date +%Y%m%d-%H%M)"
            git checkout -b "$BRANCH"
            git commit -m "chore(scraper): update OAS snapshots $(date +%Y-%m-%d) [skip ci]"
            git push origin "$BRANCH"
            gh pr create \
              --title "chore(scraper): update OAS snapshots $(date +%Y-%m-%d)" \
              --body "Automated update of OpenAPI snapshots from the API documentation scraper." \
              --base main \
              --head "$BRANCH" || echo "PR already exists or creation skipped"
          fi

      - name: Check for scraper failure
        if: env.EXIT_CODE != '0'
        run: |
          echo "Scraper failed with exit code $EXIT_CODE"
          exit 1

      - name: Post summary
        if: always()
        run: |
          cd tools/cmd/scraper
          echo "## Scraper Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run Number:** ${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Exit Code:** ${EXIT_CODE:-unknown}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f scraper.log ]; then
            echo "### Metrics" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E "(Scraped|Skipped|Failed|Duration|Cache)" scraper.log | head -20 >> "$GITHUB_STEP_SUMMARY" || echo "No metrics found" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          if ls api_changes_*.md 1> /dev/null 2>&1; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### API Changes Detected" >> "$GITHUB_STEP_SUMMARY"
            for file in api_changes_*.md; do
              echo "- $file" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### No API Changes" >> "$GITHUB_STEP_SUMMARY"
          fi
