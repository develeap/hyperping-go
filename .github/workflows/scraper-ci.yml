name: Scraper CI

on:
  pull_request:
    paths:
      - 'tools/**'
      - '.github/workflows/scraper-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'tools/**'
      - '.github/workflows/scraper-ci.yml'

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tools/cmd/scraper

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/cmd/scraper/go.mod
          cache-dependency-path: tools/cmd/scraper/go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race ./...

      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.10.1
          working-directory: tools/cmd/scraper

  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tools/cmd/scraper

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/cmd/scraper/go.mod
          cache-dependency-path: tools/cmd/scraper/go.sum

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          # -scan package avoids a govulncheck v1.1.4 internal error triggered by
          # golang.org/x/sys/unix v0.35+ using //go:linkname in auxv.go, which
          # causes go/packages to fail type-checking in the default symbol-scan
          # mode. Package-level scanning still catches all vulnerable imports.
          govulncheck -scan package ./...

      - name: License compliance
        run: |
          go mod download
          FAIL=0
          for dir in $(go list -m -f '{{.Dir}}' all 2>/dev/null | grep -v '^$'); do
            for f in "$dir/LICENSE" "$dir/LICENCE" "$dir/LICENSE.md" "$dir/LICENCE.md" "$dir/LICENSE.txt" "$dir/COPYING"; do
              # head -20 limits the regex to the license header. Without this
              # bound, MPL 2.0 license bodies false-match because their
              # "Secondary License" section names AGPL by reference (line ~71).
              if [ -f "$f" ] && head -20 "$f" | grep -qliE 'GNU GENERAL PUBLIC LICENSE|GNU AFFERO|Server Side Public License|EUPL' 2>/dev/null; then
                echo "FAIL: copyleft license detected in $f"
                FAIL=1
              fi
            done
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "PASS: no copyleft licenses in dependencies"
